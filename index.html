<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- tailwindcss link -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- favicon link -->
    <link rel="shortcut icon" href="job logo.png" type="image/x-icon">
    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>

    <!-- start header part desing -->
    <header class="w-11/12 mx-auto">
        <h1 class="text-5xl font-bold">Job Application Tracker</h1>
        <div class="grid grid-cols-3 gap-5 m-5">
            <div class="bg-amber-300">
                <p class="font-semibold text-4xl p-2 m-2">Total</p>
                <p id="total count" class="font-bold text-2xl p-2 m-2">0</p>
            </div>
            <div class="bg-green-300 ">
                <p class="font-semibold text-4xl p-2 m-2">Interview</p>
                <p id="Interview-count" class="font-bold text-2xl p-2 m-2">0</p>
            </div>
            <div class="bg-pink-300">
                <p class=" font-semibold text-4xl p-2 m-2">Rejected</p>
                <p id="Rejected-count" class="font-bold text-2xl p-2 m-2">0</p>
            </div>
        </div>
    </header>
    <!-- end header part desing -->

    <hr class="border-red-800 mb-5 mt-5">
    <!-- line break use -->
    <main class="w-11/12 mx-auto">
        <!-- main section design start -->
        <section>
            <div class="flex justify-between">
                <h1 class="font-bold text-3xl mb-3">Available Jobs</h1>
                <p id="job-count" class="text-xl text-gray-600">jobs</p>
            </div>

            <div class="flex gap-5 mb-5">
                <button class="bg-gray-600 px-2 py-2 rounded-md font-semibold text-md text-white">All</button>
                <button class="bg-gray-600 px-2 py-2 rounded-md font-semibold text-md text-white">Interview</button>
                <button class="bg-gray-600 px-2 py-2 rounded-md font-semibold text-md text-white">Rejected</button>
            </div>
            <!-- button desing complete -->
        </section>


        <!-- end main section design part -->
    </main>












    <script src="assingment.js"></script>
</body>

</html>
